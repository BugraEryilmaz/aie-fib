# Fib Task In
sc=fibonacci_1.BindTo_PE_fib_0_taskIn:DownSize_256_128_1.input
sc=DownSize_256_128_1.output:ai_engine_0.PLIO_fib_taskIn

# Fib Task Out Arg Data Out
sc=ai_engine_0.PLIO_fib_taskOut_argDataOut:StreamSplitter_256_256_1.input
sc=StreamSplitter_256_256_1.outputs_0:DownSize_256_128_2.input
sc=DownSize_256_128_2.output:fibonacci_1.BindTo_PE_fib_0_taskOut
sc=StreamSplitter_256_256_1.outputs_1:DownSize_256_128_3.input
sc=DownSize_256_128_3.output:fibonacci_1.BindTo_PE_fib_0_argDataOut

# Fib Closure In
sc=fibonacci_1.BindTo_PE_fib_0_closureIn:ai_engine_0.PLIO_fib_closureIn

# Fib Arg Out Spawn Next
sc=ai_engine_0.PLIO_fib_argOut_SpawnNext:StreamSplitter_64_512_1.input
sc=StreamSplitter_64_512_1.outputs_0:fibonacci_1.BindTo_PE_fib_0_argOut
sc=StreamSplitter_64_512_1.outputs_1:DownSize_512_128_1.input
sc=DownSize_512_128_1.output:fibonacci_1.BindTo_PE_fib_0_spawnNext

# Fib Cont0 Task In
sc=fibonacci_1.BindTo_PE_fib_cont0_0_taskIn:ai_engine_0.PLIO_fib_cont0_taskIn

# Fib Cont0 Arg Data Out
sc=ai_engine_0.PLIO_fib_cont0_argDataOut:UpSize_128_256_1.input
sc=UpSize_128_256_1.output:fibonacci_1.BindTo_PE_fib_cont0_0_argDataOut

# Fib Cont0 Arg Out
