nk=fibonacci:1:fibonacci_1
nk=DownSize_512_128:1:DownSize_512_128_1
nk=UpSize_128_256:1:UpSize_128_256_1
nk=DownSize_256_128:3:DownSize_256_128_1,DownSize_256_128_2,DownSize_256_128_3
nk=StreamSplitter_64_512:1:StreamSplitter_64_512_1
nk=StreamSplitter_256_256:1:StreamSplitter_256_256_1


sp=fibonacci_1.m_axi_00:MC_NOC0
